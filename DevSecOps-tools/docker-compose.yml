# DevSecOps-tools/docker-compose.yml
services:

  bandit:
    build: ./bandit
    volumes:
      - ./:/app

  semgrep:
    build: ./semgrep
    volumes:
      - ./:/app

  gitleaks:
    build: ./gitleaks
    volumes:
      - ./:/app

  trivy:
    build: ./trivy
    volumes:
      - ./:/app
      - trivy-cache:/root/.cache/trivy  

  pip-audit:
    build: ./pip-audit
    volumes:
      - ./:/app

  cosign:
    build: ./cosign
    volumes:
      - ./:/app
    entrypoint: ["cosign"]

volumes:
  trivy-cache:
  dependency-check-data: